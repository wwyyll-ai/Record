<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>专辑</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: sans-serif;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
      font-size: 32px;
    }

    .list {
      margin-top: 30px;
    }

    .song-btn {
      display: block;
      width: 260px;
      margin: 12px auto;
      padding: 16px;
      font-size: 20px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      background: #2c2c2c;
      color: white;
      transition: 0.3s;
    }

    .song-btn:hover {
      background: #ff4d4d;
      transform: scale(1.05);
    }

    audio {
      margin-top: 20px;
      width: 300px;
    }

    .back {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #555;
      color: white;
    }

    .back:hover {
      background: #777;
    }
  </style>
</head>
<body>

  <h1>专辑歌曲</h1>

  <div class="list">
    <button class="song-btn" onclick="play('song1.m4a')">🎵 song1</button>
    <button class="song-btn" onclick="play('song2.m4a')">🎵 song2</button>
    <button class="song-btn" onclick="play('song3.m4a')">🎵 song3</button>
    <button class="song-btn" onclick="play('song4.m4a')">🎵 song4</button>
    <button class="song-btn" onclick="play('song5.m4a')">🎵 song5</button>
  </div>

  <audio id="player" controls></audio>

  <br>
  <button class="back" onclick="back()">返回首页</button>

  <script>
    function play(file){
      document.getElementById('player').src = file;
      document.getElementById('player').play();
    }

    function back(){
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
