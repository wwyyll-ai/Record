<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>无与伦比的美丽</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom, #1e1e1e, #000);
      color: white;
      font-family: sans-serif;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 30px;
    }

    .btn {
      padding: 14px 28px;
      font-size: 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #ff4d4d;
      color: white;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff1a1a;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <h1>欢迎来到 无与伦比的美丽</h1>

  <button class="btn" onclick="enter()">进入专辑</button>

  <script>
    function enter(){
      window.location.href = "album.html";
    }
  </script>

</body>
</html>
