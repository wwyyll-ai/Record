<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>无与伦比的美丽</title>

<style>

/* ===== 背景 ===== */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url("Taylor.png") center/cover no-repeat;
  z-index:-2;
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

body{
  margin:0;
  font-family:sans-serif;
  color:white;
}

/* ===== 页面 ===== */
.page{
  display:none;
  min-height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:20px;
  text-align:center;
}

.active{display:flex;}

h1{
  font-size: clamp(26px,6vw,42px);
}

/* ===== 封面 ===== */
.cover{
  width:180px;
  height:180px;
  border-radius:20px;
  background:url("Taylor.png") center/cover;
  margin:20px 0;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* ===== 当前歌曲 ===== */
.now{
  margin:10px;
  font-size:18px;
  opacity:0.9;
}

/* ===== 按钮 ===== */
.big-btn{
  padding:14px 28px;
  font-size:20px;
  border:none;
  border-radius:14px;
  background:#ff4d4d;
  color:white;
}

.song-btn{
  width:90%;
  max-width:320px;
  margin:8px 0;
  padding:16px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.15);
  color:white;
  transition:0.2s;
}

/* 当前播放高亮 */
.song-btn.active{
  background:#ff4d4d;
  transform:scale(1.05);
}

audio{
  width:90%;
  max-width:340px;
  margin-top:15px;
  background:white;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<!-- 首页 -->
<div id="home" class="page active">
  <h1>欢迎来到<br>无与伦比的美丽</h1>
  <button class="big-btn" onclick="goAlbum()">进入专辑</button>
</div>

<!-- 专辑页 -->
<div id="album" class="page">

  <h1>专辑歌曲</h1>

  <!-- 封面 -->
  <div class="cover"></div>

  <!-- 当前歌曲 -->
  <div id="now" class="now">未播放</div>

  <button class="song-btn" onclick="play(0)">🎵 song1</button>
  <button class="song-btn" onclick="play(1)">🎵 song2</button>
  <button class="song-btn" onclick="play(2)">🎵 song3</button>
  <button class="song-btn" onclick="play(3)">🎵 song4</button>
  <button class="song-btn" onclick="play(4)">🎵 song5</button>

  <audio id="player" controls></audio>

  <button class="big-btn" onclick="goHome()">返回首页</button>

</div>

<script>

const songs = [
  "song1.m4a",
  "song2.m4a",
  "song3.m4a",
  "song4.m4a",
  "song5.m4a"
];

let current = 0;

function goAlbum(){
  home.classList.remove("active");
  album.classList.add("active");
}

function goHome(){
  album.classList.remove("active");
  home.classList.add("active");
}

function play(index){
  current = index;
  player.src = songs[index];
  player.play();

  document.getElementById("now").innerText = "🎶 正在播放：song" + (index+1);

  // 高亮按钮
  document.querySelectorAll(".song-btn").forEach(btn=>btn.classList.remove("active"));
  document.querySelectorAll(".song-btn")[index].classList.add("active");
}

/* 自动下一首 */
player.onended = function(){
  current++;
  if(current >= songs.length) current = 0;
  play(current);
};

</script>

</body>
</html>
