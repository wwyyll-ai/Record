<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">

<!-- ⭐ 手机必须要这个，不然全乱 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>无与伦比的美丽</title>

<style>

/* ===== 基础 ===== */
body{
  margin:0;
  font-family:sans-serif;
  color:white;

  background: url("Taylor.png") no-repeat center center;
  background-size: cover;

  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}

/* ===== 遮罩（确保可见性） ===== */
body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.60);
  z-index:-1;
}

/* ===== 页面 ===== */
.page{
  display:none;
  min-height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:20px;
  text-align:center;
}

.active{
  display:flex;
}

/* ===== 标题（手机放大重点） ===== */
h1{
  font-size: clamp(26px, 6vw, 42px);
  margin-bottom:25px;
  line-height:1.4;
}

/* ===== 大按钮 ===== */
.big-btn{
  padding:14px 28px;
  font-size:20px;
  border:none;
  border-radius:14px;
  background:#ff4d4d;
  color:white;
  cursor:pointer;
  margin-top:10px;
}

.big-btn:active{
  transform:scale(0.96);
}

/* ===== 歌曲按钮（重点优化手机点击） ===== */
.song-btn{
  width:90%;
  max-width:340px;
  margin:10px 0;
  padding:18px;
  font-size:20px;
  border:none;
  border-radius:14px;
  background:rgba(255,255,255,0.15);
  color:white;
  backdrop-filter: blur(6px);
}

/* ===== 播放器（关键修复：强制可见） ===== */
audio{
  width:90%;
  max-width:360px;
  margin-top:20px;
  background:white;
  border-radius:10px;
}

/* ===== 防止遮挡 ===== */
#album{
  padding-bottom:40px;
}

</style>
</head>

<body>

<!-- ===== 首页 ===== -->
<div id="home" class="page active">
  <h1>欢迎来到<br>无与伦比的美丽</h1>
  <button class="big-btn" onclick="goAlbum()">进入专辑</button>
</div>

<!-- ===== 专辑页 ===== -->
<div id="album" class="page">

  <h1>专辑歌曲</h1>

  <button class="song-btn" onclick="play('song1.m4a')">🎵 song1</button>
  <button class="song-btn" onclick="play('song2.m4a')">🎵 song2</button>
  <button class="song-btn" onclick="play('song3.m4a')">🎵 song3</button>
  <button class="song-btn" onclick="play('song4.m4a')">🎵 song4</button>
  <button class="song-btn" onclick="play('song5.m4a')">🎵 song5</button>

  <audio id="player" controls></audio>

  <button class="big-btn" onclick="goHome()">返回首页</button>

</div>

<script>

function goAlbum(){
  document.getElementById("home").classList.remove("active");
  document.getElementById("album").classList.add("active");
}

function goHome(){
  document.getElementById("album").classList.remove("active");
  document.getElementById("home").classList.add("active");
}

function play(file){
  const p = document.getElementById("player");
  p.src = file;
  p.play();
}

</script>

</body>
</html>
