<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>无与伦比的美丽</title>

<style>
/* ===== 背景 + 遮罩 ===== */
body{
  margin:0;
  font-family:sans-serif;
  color:white;

  background: url("Taylor.png") no-repeat center center fixed;
  background-size: cover;

  position: relative;
}

/* 黑色遮罩（关键高级感） */
body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.55);
  z-index:-1;
}

/* ===== 页面结构 ===== */
.page{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* 当前页面 */
.active{
  display:flex;
}

/* ===== 标题 ===== */
h1{
  font-size:40px;
  text-align:center;
  margin-bottom:30px;
}

/* ===== 大按钮（首页 + 返回） ===== */
.big-btn{
  padding:16px 34px;
  font-size:22px;
  border:none;
  border-radius:14px;
  background:#ff4d4d;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.big-btn:hover{
  transform:scale(1.08);
  background:#ff1a1a;
}

/* ===== 歌曲按钮 ===== */
.song-btn{
  width:280px;
  margin:10px;
  padding:16px;
  font-size:22px;
  border:none;
  border-radius:14px;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
  transition:0.3s;
  backdrop-filter: blur(6px);
}

.song-btn:hover{
  background:#ff4d4d;
  transform:scale(1.05);
}

/* ===== 播放器 ===== */
audio{
  margin-top:20px;
  width:320px;
}

</style>
</head>

<body>

<!-- ================= 首页 ================= -->
<div id="home" class="page active">
  <h1>欢迎来到<br>无与伦比的美丽</h1>
  <button class="big-btn" onclick="goAlbum()">进入专辑</button>
</div>

<!-- ================= 专辑页 ================= -->
<div id="album" class="page">

  <h1>专辑歌曲</h1>

  <button class="song-btn" onclick="play('song1.m4a')">🎵 song1</button>
  <button class="song-btn" onclick="play('song2.m4a')">🎵 song2</button>
  <button class="song-btn" onclick="play('song3.m4a')">🎵 song3</button>
  <button class="song-btn" onclick="play('song4.m4a')">🎵 song4</button>
  <button class="song-btn" onclick="play('song5.m4a')">🎵 song5</button>

  <audio id="player" controls></audio>

  <br>
  <button class="big-btn" style="margin-top:20px" onclick="goHome()">返回首页</button>

</div>

<script>

/* 页面切换 */
function goAlbum(){
  document.getElementById("home").classList.remove("active");
  document.getElementById("album").classList.add("active");
}

function goHome(){
  document.getElementById("album").classList.remove("active");
  document.getElementById("home").classList.add("active");
}

/* 播放音乐 */
function play(file){
  const player = document.getElementById("player");
  player.src = file;
  player.play();
}

</script>

</body>
</html>
