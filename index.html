<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>无与伦比的美丽</title>

<style>

/* ===== 背景层（关键修复） ===== */
.bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;

  background: url("Taylor.png") center center no-repeat;
  background-size: cover;

  z-index:-2;
}

/* ===== 遮罩层 ===== */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
  z-index:-1;
}

/* ===== 页面 ===== */
body{
  margin:0;
  font-family:sans-serif;
  color:white;
}

.page{
  display:none;
  min-height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:20px;
  text-align:center;
}

.active{
  display:flex;
}

/* ===== 标题 ===== */
h1{
  font-size: clamp(26px, 6vw, 42px);
  margin-bottom:25px;
}

/* ===== 按钮 ===== */
.big-btn{
  padding:14px 28px;
  font-size:20px;
  border:none;
  border-radius:14px;
  background:#ff4d4d;
  color:white;
}

.song-btn{
  width:90%;
  max-width:340px;
  margin:10px 0;
  padding:18px;
  font-size:20px;
  border:none;
  border-radius:14px;
  background:rgba(255,255,255,0.15);
  color:white;
  backdrop-filter: blur(6px);
}

/* ===== 播放器 ===== */
audio{
  width:90%;
  max-width:360px;
  margin-top:20px;
  background:white;
  border-radius:10px;
}

</style>
</head>

<body>

<!-- ⭐ 背景层 -->
<div class="bg"></div>

<!-- ⭐ 遮罩 -->
<div class="overlay"></div>

<!-- 首页 -->
<div id="home" class="page active">
  <h1>欢迎来到<br>无与伦比的美丽</h1>
  <button class="big-btn" onclick="goAlbum()">进入专辑</button>
</div>

<!-- 专辑页 -->
<div id="album" class="page">

  <h1>专辑歌曲</h1>

  <button class="song-btn" onclick="play('song1.m4a')">🎵 song1</button>
  <button class="song-btn" onclick="play('song2.m4a')">🎵 song2</button>
  <button class="song-btn" onclick="play('song3.m4a')">🎵 song3</button>
  <button class="song-btn" onclick="play('song4.m4a')">🎵 song4</button>
  <button class="song-btn" onclick="play('song5.m4a')">🎵 song5</button>

  <audio id="player" controls></audio>

  <button class="big-btn" onclick="goHome()">返回首页</button>

</div>

<script>
function goAlbum(){
  home.classList.remove("active");
  album.classList.add("active");
}

function goHome(){
  album.classList.remove("active");
  home.classList.add("active");
}

function play(file){
  player.src = file;
  player.play();
}
</script>

</body>
</html>
